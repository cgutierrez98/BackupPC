name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Resolve MSI version
        id: version
        shell: pwsh
        run: |
          if ('${{ github.ref_type }}' -eq 'tag') {
            $version = '${{ github.ref_name }}'.TrimStart('v')
          }
          else {
            [xml]$projectXml = Get-Content -Path ./LocalBackupMaster.csproj
            $version = $projectXml.Project.PropertyGroup.ApplicationDisplayVersion | Select-Object -First 1
          }

          $parts = $version.Split('.', [System.StringSplitOptions]::RemoveEmptyEntries)
          if ($parts.Count -eq 2) {
            $version = "$version.0"
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "La versión '$version' no es válida para MSI. Usa un tag como v1.2.3 o ajusta ApplicationDisplayVersion."
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Restore dependencies
        run: dotnet restore LocalBackupMaster.csproj

      - name: Restore tests
        run: dotnet restore LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj

      - name: Run tests
        run: dotnet test LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj --configuration Release --no-restore

      - name: Publish Windows App
        run: |
          dotnet publish LocalBackupMaster.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -p:RuntimeIdentifier=win10-x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:UseMonoRuntime=false `
            --output ./artifacts/publish

      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Build MSI Installer
        shell: pwsh
        run: |
          # Ensure the dotnet global tools folder is on PATH for this step
          $dotnetTools = "$env:USERPROFILE\.dotnet\tools"
          if (-not (Test-Path $dotnetTools)) { Write-Host "Warning: $dotnetTools not found, continuing anyway" }
          else { $env:PATH = "$dotnetTools;$env:PATH" }

          # Verify wix tool is available
          wix --version

          ./Installer/build-msi.ps1 `
            -PublishDir ./artifacts/publish `
            -OutputPath ./artifacts/LocalBackupMaster.msi `
            -ProductVersion '${{ steps.version.outputs.value }}'

      - name: Zip Release
        shell: pwsh
        run: Compress-Archive -Path ./artifacts/publish/* -DestinationPath ./LocalBackupMaster-Windows-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            LocalBackupMaster-Windows-x64.zip
            artifacts/LocalBackupMaster.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g. 1.0.8)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $version = "${{ github.event.inputs.version }}".TrimStart('v')
          } else {
            $version = "${{ github.ref_name }}".TrimStart('v')
          }

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Version must be semver (e.g. 1.2.3), got: $version"
          }

          "value=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Resolved version: $version"

      - name: Restore
        run: dotnet restore ./LocalBackupMaster.csproj

      - name: Restore Tests
        run: dotnet restore ./LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj

      - name: Run Tests
        run: |
          dotnet test LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj `
            --configuration Release `
            --framework net9.0-windows10.0.19041.0 `
            --no-restore

      - name: Publish App
        shell: pwsh
        run: |
          dotnet publish LocalBackupMaster.csproj `
            -c Release `
            -f net9.0-windows10.0.19041.0 `
            -r win-x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:UseMonoRuntime=false `
            --output ./artifacts/publish

      - name: Install WiX Toolset (v5)
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - name: Build MSI
        shell: pwsh
        run: |
          wix --version
          ./Installer/build-msi.ps1 `
            -PublishDir ./artifacts/publish `
            -OutputPath ./artifacts `
            -ProductVersion "${{ steps.version.outputs.value }}"

      - name: Create ZIP
        shell: pwsh
        run: |
          $v = "${{ steps.version.outputs.value }}"
          Compress-Archive `
            -Path ./artifacts/publish/* `
            -DestinationPath "./artifacts/LocalBackupMaster-$v-win-x64.zip"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ steps.version.outputs.value }}
          path: |
            artifacts/*.msi
            artifacts/*.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: Local Backup Master v${{ steps.version.outputs.value }}
          files: |
            artifacts/LocalBackupMaster-*.zip
            artifacts/LocalBackupMaster-*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
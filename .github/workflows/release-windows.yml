name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore LocalBackupMaster.csproj

      - name: Restore tests
        run: dotnet restore LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj

      - name: Run tests
        run: dotnet test LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj --configuration Release --no-restore

      - name: Publish Windows App
        run: |
          dotnet publish LocalBackupMaster.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -p:RuntimeIdentifier=win-x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:UseMonoRuntime=false `
            --output ./publish

      - name: Install WiX Toolset
        run: dotnet tool install --global wix
        
      - name: Build MSI Installer
        shell: pwsh
        run: |
          # 1. Instalar extensiones necesarias
          wix extension add -g WixToolset.UI.wixext
          wix extension add -g WixToolset.Util.wixext
          wix extension add -g WixToolset.Heat
          
          # 2. Generar fragmento de archivos (Harvesting)
          # Usamos heat para recolectar todo lo que hay en ./publish
          # NOTA: WiX 4/5 tiene formas integradas, pero por ahora usamos wix build con archivos manuales o heat
          # Por simplicidad en este paso de CI, crearemos un alias o usaremos el .wixproj
          cd Installer
          wix build Package.wxs -o ../LocalBackupMaster.msi
          
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            LocalBackupMaster-Windows-x64.zip
            LocalBackupMaster.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

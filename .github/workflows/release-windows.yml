name: Build & Release Windows

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Resolve Version
        id: version
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')

          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "Usa tags tipo v1.2.3"
          }

          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Restore
        run: dotnet restore ./LocalBackupMaster.csproj

      - name: Restore Tests
        run: dotnet restore ./LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj

      - name: Run Tests
        run: |
          dotnet test LocalBackupMaster.Tests/LocalBackupMaster.Tests.csproj `
            --configuration Release `
            --framework net9.0-windows10.0.19041.0 `
            --no-restore

      - name: Publish App
        shell: pwsh
        run: |
          dotnet publish LocalBackupMaster.csproj `
            -c Release `
            -f net9.0-windows10.0.19041.0 `
            -r win-x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:UseMonoRuntime=false `
            --output ./artifacts/publish

      - name: Install WiX Toolset (v5)
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -Append -FilePath $env:GITHUB_PATH
        shell: pwsh

      - name: Build MSI
        shell: pwsh
        run: |
          wix --version

          ./Installer/build-msi.ps1 `
            -PublishDir ./artifacts/publish `
            -OutputPath ./artifacts `
            -ProductVersion "${{ steps.version.outputs.value }}"

      - name: Zip App
        run: Compress-Archive `
          -Path ./artifacts/publish/* `
          -DestinationPath ./LocalBackupMaster-Windows-x64.zip

      - name: Upload Artifacts (debug)
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: artifacts/**

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            LocalBackupMaster-Windows-x64.zip
            artifacts/LocalBackupMaster-*.msi
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
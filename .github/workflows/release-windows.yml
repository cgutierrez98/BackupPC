name: Release Windows EXE

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui

      - name: Restore dependencies
        run: dotnet restore LocalBackupMaster/LocalBackupMaster.csproj

      - name: Publish Windows App
        run: |
          dotnet publish LocalBackupMaster/LocalBackupMaster.csproj `
            -f net9.0-windows10.0.19041.0 `
            -c Release `
            -p:RuntimeIdentifier=win-x64 `
            -p:WindowsPackageType=None `
            -p:SelfContained=true `
            -p:PublishSingleFile=false `
            -p:UseMonoRuntime=false `
            --output ./publish

      - name: Zip Release
        shell: pwsh
        run: Compress-Archive -Path ./publish/* -DestinationPath ./LocalBackupMaster-Windows-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: LocalBackupMaster-Windows-x64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

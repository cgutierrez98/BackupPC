name: Build and Release MSI

on:
  push:
    tags:
      - 'v*.*.*'

env:
  PUBLISH_DIR: artifacts/publish
  OUTPUT_DIR: artifacts

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Run Tests
        run: dotnet test -c Release --no-build --verbosity normal

      - name: Publish self-contained win-x64
        run: |
          dotnet publish -c Release -r win-x64 -f net9.0-windows10.0.19041.0 --self-contained true -o ${{ env.PUBLISH_DIR }}

      - name: Ensure dotnet tools path is on PATH
        run: |
          echo "##[add-path]$env:USERPROFILE\.dotnet\tools"
        shell: pwsh

      - name: Install WiX Toolset CLI (dotnet global tool)
        run: |
          dotnet tool install --global wix || dotnet tool update --global wix
          $env:PATH += ";$env:USERPROFILE\.dotnet\tools"
        shell: pwsh

      - name: Build MSI with build-msi.ps1
        env:
          GITHUB_TAG: ${{ github.ref_name }}
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File Installer\build-msi.ps1 \
            -PublishDir ${{ env.PUBLISH_DIR }} \
            -OutputPath ${{ env.OUTPUT_DIR }} \
            -ProductVersion ${{ github.ref_name }}
        shell: pwsh

      - name: Optionally sign MSI (signtool)
        if: ${{ secrets.SIGN_CERT != '' }}
        run: |
          echo "Signing MSI placeholder step — configure signtool and secrets"
        shell: pwsh

      - name: Create ZIP of published app
        run: |
          if (Test-Path ${{ env.OUTPUT_DIR }}) { Remove-Item -Recurse -Force ${{ env.OUTPUT_DIR }} };
          New-Item -ItemType Directory -Path ${{ env.OUTPUT_DIR }} | Out-Null
          Compress-Archive -Path ${{ env.PUBLISH_DIR }}\* -DestinationPath ${{ env.OUTPUT_DIR }}\app-${{ github.ref_name }}.zip -Force
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            ${{ env.OUTPUT_DIR }}/*.zip
            ${{ env.OUTPUT_DIR }}/*.msi

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload release assets
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ env.OUTPUT_DIR }}\app-${{ github.ref_name }}.zip
          asset_name: app-${{ github.ref_name }}.zip
          asset_content_type: application/zip
